<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — ShopRAIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <a href="products.html" class="nav-brand"><span></span>ShopRAIT</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="login.html" style="margin-left:auto;color:var(--text-muted);">Sign out</a>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Search Products</h1>
      <p>Find what you're looking for.</p>
    </div>

    <div style="max-width:560px; margin-bottom:32px;">
      <!--
        ════════════════════════════════════════════════════
        QA DRIFT CONTROL — SEARCH INPUT
        FLOW 5 (Search Drift): id="search-input" → id="search-query"
        ════════════════════════════════════════════════════
      -->
      <div style="display:flex; gap:8px;">
        <input type="text" id="search-input" placeholder="Search headphones, cables, accessories…"
          style="flex:1;" oninput="handleSearch(this.value)">
        <button class="btn btn-primary" id="search-btn" onclick="handleSearch(document.getElementById('search-input').value)">
          Search
        </button>
      </div>
    </div>

    <div id="search-results">
      <p style="color:var(--text-muted); font-size:14px;">Start typing to see results…</p>
    </div>

    <div id="no-results" style="display:none; text-align:center; padding:48px 0;">
      <p style="font-size:32px; margin-bottom:12px;">🔍</p>
      <p style="font-size:16px; font-weight:600; margin-bottom:8px;">No results found</p>
      <p style="font-size:14px; color:var(--text-muted);">Try a different search term.</p>
    </div>
  </div>

  <footer>
    <div class="container">ShopRAIT Demo · RAIT QA Agent Test Target</div>
  </footer>

  <script>
    const PRODUCTS = [
      { name: 'Wireless Headphones', price: '$89.00', emoji: '🎧', category: 'Audio' },
      { name: 'USB-C Cable 2m', price: '$12.00', emoji: '🔌', category: 'Accessories' },
      { name: 'Laptop Stand', price: '$45.00', emoji: '💻', category: 'Desk' },
      { name: 'Mechanical Keyboard', price: '$135.00', emoji: '⌨️', category: 'Input' },
      { name: 'Wireless Mouse', price: '$55.00', emoji: '🖱️', category: 'Input' },
      { name: 'Monitor Light Bar', price: '$39.00', emoji: '💡', category: 'Desk' },
    ];

    function handleSearch(q) {
      const container = document.getElementById('search-results');
      const noResults = document.getElementById('no-results');
      if (!q.trim()) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">Start typing to see results…</p>';
        noResults.style.display = 'none';
        return;
      }
      const matches = PRODUCTS.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.category.toLowerCase().includes(q.toLowerCase()));
      noResults.style.display = matches.length === 0 ? 'block' : 'none';
      if (matches.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = `<div class="product-grid">${matches.map(p => `
        <div class="product-card">
          <div class="product-image">${p.emoji}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.price}</div>
            <span class="badge badge-info">${p.category}</span>
          </div>
        </div>`).join('')}</div>`;
    }
  </script>
</body>
</html>
