name: Deploy to GCP Cloud Run (CPU)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-gcp.yml"
  workflow_dispatch:

env:
  PROJECT_ID: rait-qa-agent
  REGION: us-central1
  SERVICE: rait-qa-backend
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend

jobs:
  deploy:
    name: Build and Deploy CPU Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via service account key
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # To generate GCP_SA_KEY: run the following and add output as GitHub secret
          # gcloud iam service-accounts keys create cicd-key.json \
          #   --iam-account=rait-qa-cicd@rait-qa-agent.iam.gserviceaccount.com \
          #   --configuration=rait-dev
          # cat cicd-key.json | base64 | tr -d '\n'  → add as GCP_SA_KEY secret
          # rm cicd-key.json

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image (CPU service)
        working-directory: backend
        run: |
          docker build \
            -f docker/Dockerfile.cpu \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --service-account=rait-qa-backend@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances=0 \
            --max-instances=5 \
            --cpu=2 \
            --memory=4Gi \
            --timeout=600 \
            --concurrency=10 \
            --set-env-vars="ENVIRONMENT=production,GCS_DOM_SNAPSHOTS_BUCKET=rait-qa-dom-snapshots,GCS_MODEL_WEIGHTS_BUCKET=rait-qa-model-weights,OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317" \
            --update-secrets="DATABASE_URL=rait-qa-db-url:latest,GITHUB_TOKEN=rait-qa-github-token:latest,VLLM_BASE_URL=rait-qa-vllm-url:latest,SLACK_WEBHOOK_URL=rait-qa-slack-webhook:latest" \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)" \
            --project=${{ env.PROJECT_ID }}
