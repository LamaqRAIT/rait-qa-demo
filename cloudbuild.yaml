steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/docker/Dockerfile.cpu'
      - '-t'
      - 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:latest'
      - 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'rait-qa-backend'
      - '--image=us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--project=rait-qa-agent'
      - '--platform=managed'
      - '--service-account=rait-qa-backend@rait-qa-agent.iam.gserviceaccount.com'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--cpu=2'
      - '--memory=4Gi'
      - '--timeout=600'
      - '--concurrency=10'
      - '--set-env-vars=ENVIRONMENT=production,GCS_DOM_SNAPSHOTS_BUCKET=rait-qa-dom-snapshots,GCS_MODEL_WEIGHTS_BUCKET=rait-qa-model-weights'
      - '--update-secrets=DATABASE_URL=rait-qa-db-url:latest,GITHUB_TOKEN=rait-qa-github-token:latest,VLLM_BASE_URL=rait-qa-vllm-url:latest,SLACK_WEBHOOK_URL=rait-qa-slack-webhook:latest'
      - '--add-cloudsql-instances=rait-qa-agent:us-central1:rait-qa-db'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/rait-qa-agent/rait-qa-images/backend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
